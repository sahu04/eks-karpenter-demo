apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  instanceProfile: EKSNodeRoleCluster

  amiFamily: AL2023

  amiSelectorTerms:
    - alias: al2023@latest

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: test

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: test

  tags:
    karpenter.sh/discovery: test
